syntax = "proto3";

package news.v1;


import "news/v1/news.proto";
import "google/protobuf/empty.proto";


service NewsService {
  rpc Create (NewsServiceCreateRequest) returns (NewsServiceCreateResponse);
  rpc Get (NewsServiceGetRequest) returns (NewsServiceGetResponse);

  // Server side stream
  rpc GetAll(google.protobuf.Empty) returns (stream NewsServiceGetResponse);

  // Client side stream
  rpc UpdateNews (stream NewsServiceCreateRequest) returns (google.protobuf.Empty);

  // Bidirectional stream 
  rpc DeleteNews(stream NewsID) returns (stream NewsIdResponse);
}