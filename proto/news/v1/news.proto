syntax = "proto3";
package news.v1;

option go_package = "news/buf/grpc/api/news/v1;newsv1";

import "google/protobuf/timestamp.proto";

message NewsServiceGetRequest {
  string id = 1;
}

message NewsServiceGetResponse {
  string id = 1;
  string author = 2;
  string title = 3;
  string summary = 4;
  string content = 5;
  string source = 6;
  repeated string tags = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
}

message NewsServiceCreateRequest {
  string id = 1;
  string author = 2;
  string title = 3;
  string summary = 4;
  string content = 5;
  string source = 6;
  repeated string tags = 7;
}

message NewsServiceCreateResponse {
  string id = 1;
  string author = 2;
  string title = 3;
  string summary = 4;
  string content = 5;
  string source = 6;
  repeated string tags = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
}


