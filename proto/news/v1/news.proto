syntax = "proto3";
package news.v1;



import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

message NewsServiceGetRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message NewsServiceGetResponse {
  string id = 1;
  string author = 2;
  string title = 3;
  string summary = 4;
  string content = 5;
  string source = 6;
  repeated string tags = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
}

message NewsServiceCreateRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string author = 2 [(buf.validate.field).string.min_len = 2];
  string title = 3 [(buf.validate.field).string.min_len = 2];
  string summary = 4 [(buf.validate.field).string.min_len = 6];
  string content = 5 [(buf.validate.field).string.min_len = 6];
  string source = 6 [(buf.validate.field).string.min_len = 2];
  repeated string tags = 7;
}

message NewsServiceCreateResponse {
  string id = 1;
  string author = 2;
  string title = 3;
  string summary = 4;
  string content = 5;
  string source = 6;
  repeated string tags = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  google.protobuf.Timestamp deleted_at = 10;
}

message NewsID {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message NewsIdResponse {
  string id = 1;
}


